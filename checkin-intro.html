<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in — Grand Palace Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8CC7A;--gold-dim:rgba(201,168,76,0.12);
  --dark:#0C0C0C;--card:#191919;--border:rgba(201,168,76,0.2);
  --text:#F0EDE8;--muted:#666;
}
html,body{height:100%}
body{
  background:var(--dark);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
}

/* BG */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 100% 80% at 50% -20%, rgba(201,168,76,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 90%, rgba(201,168,76,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 90% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
  pointer-events:none;
}

/* GRAIN */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.4;
}

.wrap{
  position:relative;z-index:1;
  text-align:center;
  padding:40px 24px;
  width:100%;max-width:480px;
  animation:fadeIn .8s ease both;
}

/* EMBLEM */
.emblem{
  width:72px;height:72px;
  border:1px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;position:relative;
}
.emblem::after{
  content:'';position:absolute;inset:6px;
  border-radius:50%;border:1px solid rgba(201,168,76,0.2);
}
.emblem svg{width:28px;height:28px;fill:none;stroke:var(--gold);stroke-width:1.5}

.hotel-tag{
  font-size:10px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}

.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:300;line-height:1.2;
  margin-bottom:8px;
}

.tagline{
  font-size:13px;color:var(--muted);
  margin-bottom:48px;line-height:1.6;
}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:10px;
  margin-bottom:48px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}

/* LANGUAGE CARDS */
.lang-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:14px;margin-bottom:40px;
}

.lang-card{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:3px;
  padding:32px 20px 28px;
  cursor:pointer;
  text-decoration:none;
  display:block;
  transition:all .3s ease;
  overflow:hidden;
}

.lang-card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
  opacity:0;transition:opacity .3s;
}

.lang-card::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform .3s ease;
}

.lang-card:hover{
  border-color:var(--gold);
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.lang-card:hover::before{opacity:1}
.lang-card:hover::after{transform:scaleX(1)}

.flag{
  font-size:36px;
  margin-bottom:16px;
  display:block;
  line-height:1;
}

.lang-name{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:300;
  color:var(--text);margin-bottom:4px;
}

.lang-sub{
  font-size:11px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
}

/* ACTIVE PRESS */
.lang-card:active{transform:translateY(-1px)}

/* BOOKING INFO */
.booking-ref{
  font-size:11px;color:rgba(136,136,136,0.4);
  letter-spacing:1px;
}
.booking-ref strong{color:rgba(201,168,76,0.5);font-weight:400}

/* FOOTER */
.footer{
  position:fixed;bottom:20px;left:0;right:0;
  text-align:center;
  font-size:10px;color:rgba(136,136,136,0.3);
  letter-spacing:1.5px;text-transform:uppercase;
  z-index:1;
}
.footer a{color:var(--gold);text-decoration:none;opacity:.5}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* Stagger children */
.emblem{animation:fadeIn .6s .1s ease both}
.hotel-tag{animation:fadeIn .6s .2s ease both}
.headline{animation:fadeIn .6s .3s ease both}
.tagline{animation:fadeIn .6s .35s ease both}
.divider{animation:fadeIn .6s .4s ease both}
.lang-grid{animation:fadeIn .6s .5s ease both}
.booking-ref{animation:fadeIn .6s .6s ease both}
</style>
</head>
<body>

<div class="wrap">
  <div class="emblem">
    <svg viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>
  </div>

  <div class="hotel-tag">Grand Palace Hotel</div>

  <h1 class="headline">Welcome &nbsp;·&nbsp; Willkommen</h1>
  <p class="tagline">Please select your preferred language<br>Bitte wählen Sie Ihre Sprache</p>

  <div class="divider"><div class="diamond"></div></div>

  <div class="lang-grid">
    <a class="lang-card" href="digital-checkin-form-en.html" id="enCard">
      <span class="flag">🇬🇧</span>
      <div class="lang-name">English</div>
      <div class="lang-sub">Continue in English</div>
    </a>
    <a class="lang-card" href="digital-checkin-form.html" id="deCard">
      <span class="flag">🇩🇪</span>
      <div class="lang-name">Deutsch</div>
      <div class="lang-sub">Weiter auf Deutsch</div>
    </a>
  </div>

  <div class="booking-ref" id="bookingRef"></div>
</div>

<div class="footer">Powered by <a href="#">AIsellence</a> &nbsp;·&nbsp; Digital Hotel Assistant</div>

<script>
  // Read booking ID from URL and pass it through to the form
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('booking');
  const guestName = params.get('guest');

  if (bookingId) {
    const query = `?booking=${bookingId}${guestName ? '&guest='+guestName : ''}`;
    document.getElementById('enCard').href = 'digital-checkin-form-en.html' + query;
    document.getElementById('deCard').href = 'digital-checkin-form.html' + query;
    document.getElementById('bookingRef').innerHTML = `Booking <strong>#${bookingId}</strong>`;
  }

  // Optional: auto-detect browser language and highlight suggestion
  const browserLang = navigator.language?.toLowerCase() || '';
  if (!browserLang.startsWith('de')) {
    document.getElementById('enCard').style.borderColor = 'rgba(201,168,76,0.45)';
  } else {
    document.getElementById('deCard').style.borderColor = 'rgba(201,168,76,0.45)';
  }
</script>
</body>
</html>
